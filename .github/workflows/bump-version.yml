name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 1.2.3 or v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Normalize version string
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BARE="${VERSION#v}"
          echo "bare=${BARE}" >> "$GITHUB_OUTPUT"
          echo "tag=v${BARE}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.bare }}"/' Cargo.toml

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD "${{ steps.version.outputs.tag }}"
